<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Reservation</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">

        <div class="container">

            <a class="navbar-brand fw-bold" href="index.html">
                <img src="logo.png" class="d-inline-block me-2 rounded" alt="Logo" width="30" height="30">
                Foodie's
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="index.html">
                            Home
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="about.html">
                            About
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="menu.html">
                            Menu
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="gallery.html">
                            Gallery
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="reservation.html">
                            Reservation
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">
                            Contact
                        </a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- Banner -->

    <section class="page-banner text-white text-center d-flex align-items-center">

        <div class="container">

            <h1 class="display-4 fw-bold">

                Reserve A Table

            </h1>

        </div>

    </section>

    <!-- Reservation Form -->

    <section class="py-5">

        <div class="container">

            <div class="row justify-content-center">

                <div class="col-lg-8">

                    <div class="card shadow border-0 p-4">

                        <form>

                            <div class="row">

                                <div class="col-md-6 mb-3">

                                    <label class="form-label">
                                        Name
                                    </label>

                                    <input type="text" class="form-control" required>

                                </div>

                                <div class="col-md-6 mb-3">

                                    <label class="form-label">
                                        Phone
                                    </label>

                                    <input type="tel" class="form-control" required>

                                </div>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Date
                                </label>

                                <input type="date" class="form-control">

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Guests
                                </label>

                                <select class="form-select">

                                    <option>2</option>
                                    <option>4</option>
                                    <option>6</option>
                                    <option>8</option>

                                </select>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Special Request
                                </label>

                                <textarea class="form-control" rows="4"></textarea>

                            </div>

                            <button class="btn btn-warning w-100">

                                Reserve Table

                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <!-- Footer -->

    <footer class="bg-dark text-white py-5">

        <div class="container">

            <div class="row">

                <div class="col-md-4 text-md-start">

                    <a class="navbar-brand fw-bold" href="index.html">
                        <img src="logo.png" class="d-inline-block me-2 rounded" alt="Logo" width="30" height="30">
                        Foodie's
                    </a>


                    <p class="mt-3">
                        Premium restaurant experience.
                    </p>

                </div>

                <div class="col-md-4 mx-auto text-md-center">

                    <h4>Opening Hours</h4>

                    <p>Mon-Sun : 10AM - 11PM</p>

                </div>

                <div class="col-md-3 text-md-end">

                    <h4>Follow Us</h4>

                    <i class="bi bi-facebook me-3"></i>
                    <i class="bi bi-instagram me-3"></i>
                    <i class="bi bi-twitter"></i>

                </div>
                <div class="container text-center mt-5">
                    <p class="mb-0">© 2026 Foodie's Restaurant. All Rights Reserved.</p>
                </div>

            </div>

        </div>

    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
